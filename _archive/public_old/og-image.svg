<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c8e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g stroke="rgba(0,200,224,0.06)" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Cyan accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#cyan-glow)" />

  <!-- Logo: AI (red) + MediaFlow (white) -->
  <text x="100" y="260" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="110" fill="#dc2626" filter="url(#glow)">AI</text>
  <text x="282" y="260" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="110" fill="#ffffff">MediaFlow</text>

  <!-- Tagline -->
  <text x="100" y="320" font-family="Arial, sans-serif" font-weight="400" font-size="32" fill="rgba(0,200,224,0.9)" letter-spacing="2">Artificial Intelligence Agency · Kerry, Ireland</text>

  <!-- Divider -->
  <rect x="100" y="350" width="120" height="3" fill="url(#cyan-glow)" rx="2"/>

  <!-- Services row -->
  <text x="100" y="420" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">AI Phone Assistants  ·  Website Chatbots  ·  Business Automation  ·  AI Marketing Videos</text>

  <!-- Bottom tagline -->
  <text x="100" y="510" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.85)">Kerry's leading AI agency — serving businesses across Ireland</text>

  <!-- URL -->
  <text x="100" y="570" font-family="Arial, sans-serif" font-size="22" fill="rgba(0,200,224,0.7)">aimediaflow.net</text>

  <!-- Cyan accent bar bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#cyan-glow)" />
</svg>
